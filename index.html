<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>video.mp4</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  transition: 1s;
}

/* VHS */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.04) 0px,
    rgba(255,255,255,0.04) 2px,
    transparent 2px,
    transparent 4px
  );
  pointer-events: none;
  animation: flicker 0.12s infinite;
}

@keyframes flicker {
  0% {opacity: 0.9;}
  50% {opacity: 1;}
  100% {opacity: 0.85;}
}

/* GLITCH */
.glitch {
  animation: glitch 0.15s infinite;
}

@keyframes glitch {
  0% {transform: translate(0);}
  25% {transform: translate(-4px, 2px);}
  50% {transform: translate(4px, -2px);}
  75% {transform: translate(-2px, -4px);}
  100% {transform: translate(0);}
}

/* BUTTON BREAK EFFECT */
.broken button {
  position: relative;
  animation: shake 0.2s infinite;
}

.broken button::before,
.broken button::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 2px;
  background: red;
  left: 0;
}

.broken button::before {
  top: 30%;
  transform: rotate(10deg);
}

.broken button::after {
  top: 70%;
  transform: rotate(-10deg);
}

@keyframes shake {
  0% {transform: translate(0);}
  50% {transform: translate(2px, -2px);}
  100% {transform: translate(0);}
}

/* UI */
#container {
  text-align: center;
  max-width: 650px;
}

button {
  margin: 10px;
  padding: 10px 20px;
  cursor: pointer;
}

.flash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: red;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  opacity: 0;
  pointer-events: none;
}

.blue {
  background: #001a33;
  color: #66aaff;
}

.blackout {
  background: black;
  color: red;
}
</style>
</head>

<body>

<div id="container">
  <h1>⚠ FLASHING LIGHTS WARNING ⚠</h1>
  <p>This program contains flashing images.<br>Viewer discretion is advised.</p>
  <button onclick="startIntro()">Continue</button>
</div>

<div id="flash" class="flash">DONT LOOK BEHIND YOU</div>

<script>
let level = 0;
let index = 0;
let flashInterval = null;

/* LEVELS */
const levels = [
  {
    name: "LEVEL 1: BASIC EVALUATION",
    questions: [
      {text:"Do you feel safe right now?", type:"yn"},
      {text:"Are you alone?", type:"yn"},
      {text:"Would you rather stay here or leave?", type:"wyr", a:"Stay", b:"Leave"}
    ]
  },
  {
    name: "LEVEL 2: AWARENESS",
    questions: [
      {text:"Do you feel watched?", type:"yn"},
      {text:"Have you checked behind you?", type:"yn"},
      {text:"Would you rather look now or later?", type:"wyr", a:"Now", b:"Later"}
    ]
  },
  {
    name: "LEVEL 3: PRESENCE",
    questions: [
      {text:"Something is there. Do you believe it?", type:"yn"},
      {text:"It is watching you. Do you accept that?", type:"yn"},
      {text:"Would you rather ignore it or face it?", type:"wyr", a:"Ignore it", b:"Face it"}
    ]
  },
  {
    name: "LEVEL 4: REALISATION",
    questions: [
      {text:"Why are you still here?", type:"yn"},
      {text:"You were told to leave. Why didn't you?", type:"yn"},
      {text:"Would you rather stay… or turn around?", type:"wyr", a:"Stay", b:"Turn around"}
    ]
  }
];

/* WATCHER */
const watcherLines = [
  "YOU KEPT WATCHING.",
  "THAT WAS YOUR FIRST MISTAKE.",
  "I CAN SEE YOU.",
  "STOP CLICKING.",
  "YOU DON'T CONTROL THIS.",
  "LOOK AT THE BUTTONS.",
  "I BROKE THEM.",
  "I AM RIGHT BEHIND YOU."
];

/* INTRO */
function startIntro() {
  document.body.classList.add("glitch");

  setTimeout(() => {
    document.body.classList.remove("glitch");

    document.getElementById("container").innerHTML = `
      <p>Please turn off all your lights until the assessment is finished.</p>
    `;

    setTimeout(() => {
      document.body.classList.add("blue");
      setTimeout(startGame, 3000);
    }, 3000);

  }, 1500);
}

/* START */
function startGame() {
  level = 0;
  index = 0;
  showLevelIntro();
}

function showLevelIntro() {
  document.getElementById("container").innerHTML = `<h1>${levels[level].name}</h1>`;
  setTimeout(renderQuestion, 2000);
}

function renderQuestion() {
  let q = levels[level].questions[index];

  let buttons = "";

  if (q.type === "yn") {
    buttons = `<button onclick="next()">YES</button>
               <button onclick="next()">NO</button>`;
  } else {
    buttons = `<button onclick="next()">${q.a}</button>
               <button onclick="next()">${q.b}</button>`;
  }

  document.getElementById("container").innerHTML = `
    <h2>${levels[level].name}</h2>
    <p id="question">${q.text}</p>
    ${buttons}
  `;
}

/* NEXT */
function next() {
  index++;

  if (index >= levels[level].questions.length) {
    level++;
    index = 0;

    if (level < levels.length) {
      showLevelIntro();
      return;
    } else {
      startWatcher();
      return;
    }
  }

  renderQuestion();

  if (level >= 2) glitchText();
  if (level >= 3) startFlash();
}

/* GLITCH TEXT */
function glitchText() {
  let q = document.getElementById("question");
  if (!q) return;

  let original = q.innerText;

  setInterval(() => {
    q.innerText = Math.random() > 0.6 ? "IT SEES YOU" : original;
  }, 200);
}

/* FLASH */
function startFlash() {
  if (flashInterval) return;

  flashInterval = setInterval(() => {
    let flash = document.getElementById("flash");
    flash.style.opacity = 1;
    setTimeout(() => flash.style.opacity = 0, 120);
  }, 1800);
}

/* WATCHER */
function startWatcher() {
  let i = 0;
  document.body.classList.add("glitch");
  document.body.classList.add("broken");

  function nextLine() {
    if (i < watcherLines.length) {
      document.getElementById("container").innerHTML = `<h1>${watcherLines[i]}</h1>`;
      i++;
      setTimeout(nextLine, 2000);
    } else {
      fakeError();
    }
  }

  nextLine();
}

/* FAKE ERROR */
function fakeError() {
  document.body.className = "";
  document.body.style.background = "black";
  document.getElementById("container").innerHTML = `
    <h1>ERROR</h1>
    <p>Signal Lost.</p>
    <p>Attempting Recovery...</p>
  `;

  setTimeout(() => {
    document.body.classList.add("glitch");
  }, 1000);

  setTimeout(endGame, 3000);
}

/* END */
function endGame() {
  clearInterval(flashInterval);
  document.getElementById("flash").style.opacity = 0;

  document.body.className = "blackout";

  document.getElementById("container").innerHTML = `
    <h1>This game was coded and created by:</h1>
    <h2>GStudios</h2>
  `;
}

/* 2 MIN GLITCH */
setInterval(() => {
  document.body.classList.add("glitch");
  setTimeout(() => document.body.classList.remove("glitch"), 2000);
}, 120000);

</script>

</body>
</html>
