<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>video.mp4</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  transition: 1s;
}


body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.04) 0px,
    rgba(255,255,255,0.04) 2px,
    transparent 2px,
    transparent 4px
  );
  pointer-events: none;
  animation: flicker 0.12s infinite;
}

@keyframes flicker {
  0% {opacity: 0.9;}
  50% {opacity: 1;}
  100% {opacity: 0.85;}
}


.glitch {
  animation: glitch 0.15s infinite;
}

@keyframes glitch {
  0% {transform: translate(0);}
  25% {transform: translate(-4px, 2px);}
  50% {transform: translate(4px, -2px);}
  75% {transform: translate(-2px, -4px);}
  100% {transform: translate(0);}
}

#container {
  text-align: center;
  max-width: 650px;
}

button {
  margin: 10px;
  padding: 10px 20px;
  cursor: pointer;
}

.flash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: red;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  opacity: 0;
  pointer-events: none;
}

.blue {
  background: #001a33;
  color: #66aaff;
}

.blackout {
  background: black;
  color: red;
}
</style>
</head>

<body>

<div id="container">
  <h1>⚠ FLASHING LIGHTS WARNING ⚠</h1>
  <p>This program contains flashing images.<br>Viewer discretion is advised.</p>
  <button onclick="startIntro()">Continue</button>
</div>

<div id="flash" class="flash">DONT LOOK BEHIND YOU</div>

<script>
let level = 0;
let index = 0;
let flashInterval = null;


const levels = [
  {
    name: "LEVEL 1: BASIC EVALUATION",
    questions: [
      "Do you feel safe right now?",
      "Are you alone?",
      "Would you rather stay here or leave?"
    ]
  },
  {
    name: "LEVEL 2: AWARENESS",
    questions: [
      "Do you feel watched?",
      "Have you checked behind you?",
      "Would you rather look now or later?"
    ]
  },
  {
    name: "LEVEL 3: PRESENCE",
    questions: [
      "Something is there. Do you believe it?",
      "It is watching you. Do you accept that?",
      "Would you rather ignore it or face it?"
    ]
  },
  {
    name: "LEVEL 4: REALISATION",
    questions: [
      "Why are you still here?",
      "You were told to leave. Why didn't you?",
      "Would you rather stay… or turn around?"
    ]
  }
];


const watcherLines = [
  "YOU KEPT WATCHING.",
  "THAT WAS YOUR FIRST MISTAKE.",
  "I CAN SEE YOU.",
  "TURN AROUND.",
  "NO… DON'T.",
  "TOO LATE.",
  "I AM RIGHT BEHIND YOU."
];


function startIntro() {
  document.body.classList.add("glitch");

  setTimeout(() => {
    document.body.classList.remove("glitch");

    document.getElementById("container").innerHTML = `
      <p>Please turn off all your lights until the assessment is finished.</p>
    `;

    setTimeout(() => {
      document.body.classList.add("blue");

      setTimeout(startGame, 3000);
    }, 3000);

  }, 1500);
}


function startGame() {
  level = 0;
  index = 0;
  showLevelIntro();
}


function showLevelIntro() {
  document.getElementById("container").innerHTML = `
    <h1>${levels[level].name}</h1>
  `;

  setTimeout(renderQuestion, 2000);
}


function renderQuestion() {
  document.getElementById("container").innerHTML = `
    <h2>${levels[level].name}</h2>
    <p id="question">${levels[level].questions[index]}</p>
    <button onclick="next()">YES</button>
    <button onclick="next()">NO</button>
  `;
}


function next() {
  index++;

  if (index >= levels[level].questions.length) {
    level++;
    index = 0;

    if (level < levels.length) {
      showLevelIntro();
      return;
    } else {
      startWatcher();
      return;
    }
  }

  renderQuestion();

  if (level >= 2) glitchText();
  if (level >= 3) startFlash();
}


function glitchText() {
  let q = document.getElementById("question");
  if (!q) return;

  let original = q.innerText;

  setInterval(() => {
    q.innerText = Math.random() > 0.6 ? "IT SEES YOU" : original;
  }, 200);
}


function startFlash() {
  if (flashInterval) return;

  flashInterval = setInterval(() => {
    let flash = document.getElementById("flash");
    flash.style.opacity = 1;

    setTimeout(() => {
      flash.style.opacity = 0;
    }, 120);
  }, 1800);
}


function startWatcher() {
  let i = 0;
  document.body.classList.add("glitch");

  function nextLine() {
    if (i < watcherLines.length) {
      document.getElementById("container").innerHTML = `
        <h1>${watcherLines[i]}</h1>
      `;
      i++;
      setTimeout(nextLine, 2000);
    } else {
      endGame();
    }
  }

  nextLine();
}


setInterval(() => {
  document.body.classList.add("glitch");

  setTimeout(() => {
    document.body.classList.remove("glitch");
  }, 2000);

}, 120000);


function endGame() {
  document.body.className = "blackout";


  clearInterval(flashInterval);
  document.getElementById("flash").style.opacity = 0;

  document.getElementById("container").innerHTML = `
    <h1>This game was coded and created by:</h1>
    <h2>GStudios</h2>
  `;
}
</script>

</body>
</html>
